services:
  - type: web
    name: nce-energy-permit-ai
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt && python3 -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2')"
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PYTHONPATH
        value: /opt/render/project/src
    healthCheckPath: /api/health
