services:
  - type: web
    name: nce-energy-permit-ai
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt && python3 permit_ai/build_index.py && python3 permit_ai/ingest_countries.py --country PL SE DA NO
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: SENTENCE_TRANSFORMERS_HOME
        value: /opt/render/project/src/.model_cache
    healthCheckPath: /api/health
