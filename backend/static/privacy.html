  s7h:'7. Dine rettigheder (GDPR art. 15–22)',
  s7b:'<ul><li><strong>Art. 15 &mdash; Ret til indsigt:</strong> Du kan anmode om en kopi af dine personoplysninger.</li><li><strong>Art. 16 &mdash; Ret til berigtigelse:</strong> Du kan anmode om rettelse af unøjagtige oplysninger.</li><li><strong>Art. 17 &mdash; Ret til sletning:</strong> Du kan anmode om sletning, når der ikke længere er grundlag for behandling.</li><li><strong>Art. 18 &mdash; Ret til begrænsning:</strong> Du kan anmode om begrænsning af behandlingen i visse situationer.</li><li><strong>Art. 20 &mdash; Ret til dataportabilitet:</strong> Du kan anmode om dine oplysninger i maskinlæsbart format.</li><li><strong>Art. 21 &mdash; Ret til indsigelse:</strong> Du kan gøre indsigelse mod behandling baseret på legitim interesse.</li><li><strong>Tilbagetrækning af samtykke:</strong> Hvis behandling er baseret på samtykke, kan du til enhver tid trække det tilbage.</li><li><strong>Art. 77 &mdash; Ret til at klage:</strong> Du kan indgive en klage til tilsynsmyndigheden.</li></ul><p>Send anmodninger til: <a href="mailto:info@ncenergy.fi">info@ncenergy.fi</a></p>',
  s8h:'8. Automatiseret beslutningstagning',
  s8b:'<p>NCE Permit AI producerer AI-assisterede udkast til tilladelsesdokumenter. <strong>Disse udkast udgør ikke automatiserede retligt bindende afgørelser</strong> i den forstand, der er omhandlet i GDPR art. 22. Alt AI-genereret indhold kræver ekspertgennemgang inden officiel brug.</p>',

  s10b:'<p>De oplysninger, der kræves for at generere udkast til tilladelsesdokumenter (ansøgerens navn, kommune, projekttype, ejendomsidentifikator), er nødvendige for, at tjenesten fungerer. IP-adresselogning er en automatisk teknisk foranstaltning.</p>',

  s8b:'<p>NCE Permit AI tworzy wspomagane przez AI projekty dokumentów zezwolenia. <strong>Projekty te nie stanowią zautomatyzowanych prawnie wiążących decyzji</strong> w rozumieniu art. 22 RODO. Wszelkie treści AI wymagają weryfikacji eksperta przed oficjalnym użyciem.</p>',
  s9h:'9. Organ nadzorczy',
  s9b:'<p><strong>Urząd Rzecznika Ochrony Danych (Finlandia)</strong><br>Skrytka pocztowa 800, 00531 Helsinki<br>Tel: +358 29 566 6700<br><a href="https://tietosuoja.fi" target="_blank">tietosuoja.fi</a> &nbsp;|&nbsp; <a href="mailto:tietosuoja@om.fi">tietosuoja@om.fi</a></p>',

  s10b:'<p>Dane wymagane do wygenerowania projektów dokumentów zezwolenia (imię wnioskodawcy, gmina, typ projektu, identyfikator nieruchomości) są niezbędne do funkcjonowania usługi. Rejestrowanie adresów IP jest automatycznym środkiem technicznym.</p>',

  s8h:'8. Automatisierte Entscheidungsfindung',

    b.classList.toggle('active', b.dataset.lang === lang)
  );
  try { localStorage.setItem('nce_lang', lang); } catch(_) {}
}

(function buildSwitcher() {
  const el = document.getElementById('langSwitcher');
  el.innerHTML = LANGS.map(l =>
    '<button class="lang-btn" data-lang="' + l + '" onclick="render(\'' + l + '\')">' + FLAGS[l] + ' ' + l + '</button>'
  ).join('');
})();

const initLang = (function() {
  try { var s = localStorage.getItem('nce_lang'); if (s && T[s]) return s; } catch(_) {}
  return 'FI';
})();
render(initLang);
</script>
</body>
</html>
