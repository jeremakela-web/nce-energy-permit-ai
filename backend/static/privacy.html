PL: {

  s3h:'3. Kategorie danych osobowych',
  s3b:'<ul><li>Imię i nazwisko, nazwa firmy i dane kontaktowe</li><li>Numer NIP/KRS</li><li>Dane lokalizacyjne: gmina, adres, identyfikator nieruchomości</li><li>Dane projektu: moc (MW), typ projektu, faza zezwolenia</li><li>Adresy e-mail</li><li>Dane do fakturowania</li><li>Dane techniczne (adres IP, logi)</li></ul>',

     +'<tr><td>Maanmittauslaitos (MML)</td><td>MML INSPIRE API</td><td>Finlandia, UE</td><td>Terytorium UE</td></tr>'

     +'<tr><td>Dane konta użytkownika</td><td>Do usunięcia + 30 dni</td></tr>'

  s6h:'6. Prawa podmiotu danych (RODO art. 15–22)',
  s6b:'<ul>'
     +'<li><strong>Art. 15 — Prawo dostępu:</strong> Możesz zażądać kopii swoich danych osobowych.</li>'

     +'<li><strong>Art. 18 — Prawo do ograniczenia:</strong> Możesz zażądać ograniczenia przetwarzania w określonych sytuacjach.</li>'

  s7h:'7. AI i nadzór ludzki',
  s7b:'<p>NCE Permit AI używa AI wyłącznie w celu wspomagania generowania projektów dokumentów zezwolenia. <strong>Wszelkie treści generowane przez AI są wyłącznie wersją roboczą</strong> i muszą zostać sprawdzone przez kompetentnego specjalistę przed oficjalnym użyciem.</p>'
     +'<p>NCE nie podejmuje zautomatyzowanych decyzji wywołujących skutki prawne (RODO art. 22). Usługa jest obsługiwana zgodnie z zasadami nadzoru ludzkiego określonymi w unijnym akcie o sztucznej inteligencji.</p>',

function render(lang) {
  const d = T[lang] || T.FI;
  document.getElementById('pageTitle').textContent   = TITLES[lang] || TITLES.FI;
  document.getElementById('navBack').textContent     = d.nav_back;
  document.getElementById('docUpdated').textContent  = d.updated;
  document.getElementById('introNotice').textContent = d.notice;
  ['s1h','s2h','s3h','s4h','s5h','s6h','s7h','s8h'].forEach(k => {
    document.getElementById(k).textContent = d[k];
  });
  ['s1b','s2b','s3b','s4b','s5b','s6b','s7b','s8b'].forEach(k => {
    document.getElementById(k).innerHTML = d[k];
  });
  document.querySelectorAll('.lang-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.lang === lang)
  );
  try { localStorage.setItem('nce_lang', lang); } catch(_) {}
}

(function buildSwitcher() {
  const el = document.getElementById('langSwitcher');
  el.innerHTML = LANGS.map(l =>
    '<button class="lang-btn" data-lang="' + l + '" onclick="render(\'' + l + '\')">' + FLAGS[l] + ' ' + l + '</button>'
  ).join('');
})();

const initLang = (function() {
  try { var s = localStorage.getItem('nce_lang'); if (s && T[s]) return s; } catch(_) {}
  return 'FI';
})();
render(initLang);
</script>
