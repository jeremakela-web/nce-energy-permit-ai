function render(lang) {
  const d = T[lang] || T.FI;
  const isShort = !FULL_LANGS.has(lang);

  document.getElementById('pageTitle').textContent  = TITLES[lang] || TITLES.FI;
  document.getElementById('navBack').textContent    = d.nav_back;
  document.getElementById('docUpdated').textContent = d.updated;

  document.getElementById('fullContent').style.display  = isShort ? 'none' : '';
  document.getElementById('shortContent').style.display = isShort ? ''     : 'none';

  if (isShort) {
    document.getElementById('shortLangNotice').innerHTML = d.lang_notice;
    document.getElementById('shortCtrlH').textContent    = d.ctrl_h;
    document.getElementById('shortCtrlB').innerHTML      = d.ctrl_b;
    document.getElementById('shortRightsH').textContent  = d.rights_h;
    document.getElementById('shortRightsB').innerHTML    = d.rights_b;
    document.getElementById('shortSupH').textContent     = d.sup_h;
    document.getElementById('shortSupB').innerHTML       = d.sup_b;
  } else {
    document.getElementById('introNotice').textContent = d.notice;
    ['s1h','s2h','s3h','s4h','s5h','s6h','s7h','s8h'].forEach(k => {
      document.getElementById(k).textContent = d[k];
    });
    ['s1b','s2b','s3b','s4b','s5b','s6b','s7b','s8b'].forEach(k => {
      document.getElementById(k).innerHTML = d[k];
    });
  }

  document.querySelectorAll('.lang-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.lang === lang)
  );
  try { localStorage.setItem('nce_lang', lang); } catch(_) {}
}

(function buildSwitcher() {
  const el = document.getElementById('langSwitcher');
  el.innerHTML = LANGS.map(l =>
    '<button class="lang-btn" data-lang="' + l + '" onclick="render(\'' + l + '\')">' + FLAGS[l] + ' ' + l + '</button>'
  ).join('');
})();

const initLang = (function() {
  // 1. URL ?lang= param (e.g. /privacy?lang=EN)
  try {
    const p = new URLSearchParams(location.search).get('lang');
    if (p && T[p.toUpperCase()]) return p.toUpperCase();
  } catch(_) {}
  // 2. Shared localStorage key used by the main app
  try { const s = localStorage.getItem('nce_lang'); if (s && T[s]) return s; } catch(_) {}
  return 'FI';
})();
render(initLang);
</script>
